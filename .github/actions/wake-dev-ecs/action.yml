name: Wake dev ECS service
description: Scale the dev ECS service up and poll /ping until it is ready.

inputs:
  aws-region:
    description: AWS region that hosts the dev ECS service.
    required: true
  ecs-cluster:
    description: ECS cluster name.
    required: true
  ecs-service:
    description: ECS service name.
    required: true
  desired-count:
    description: Desired count to request before polling.
    required: true
    default: "1"
  ping-url:
    description: URL to poll for readiness.
    required: true
  expected-text:
    description: Optional exact response body required from the ping endpoint.
    required: false
    default: ""
  timeout-seconds:
    description: Hard monotonic readiness deadline, including request and sleep time.
    required: true
    default: "1500"
  poll-seconds:
    description: Seconds between readiness requests, capped by the remaining deadline.
    required: true
    default: "10"
  max-attempts:
    description: Secondary cap on readiness requests within the hard deadline.
    required: true
    default: "150"
  required-consecutive:
    description: Consecutive exact responses required before readiness succeeds.
    required: true
    default: "3"

runs:
  using: composite
  steps:
    - name: Scale service and poll readiness
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
        ECS_CLUSTER: ${{ inputs.ecs-cluster }}
        ECS_SERVICE: ${{ inputs.ecs-service }}
        DESIRED_COUNT: ${{ inputs.desired-count }}
        PING_URL: ${{ inputs.ping-url }}
        EXPECTED_TEXT: ${{ inputs.expected-text }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        POLL_SECONDS: ${{ inputs.poll-seconds }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        REQUIRED_CONSECUTIVE: ${{ inputs.required-consecutive }}
      run: |
        set -euo pipefail

        # Shared with deploy/deploy_dev.sh: one monotonic deadline includes
        # both curl and sleep time, and stable readiness requires consecutive
        # exact responses instead of a single transient hit.
        source "${GITHUB_ACTION_PATH}/../../../deploy/readiness_poll.sh"

        # Fail before changing ECS state when an input cannot form a bounded
        # polling window. The helper validates again at invocation time.
        readiness_validate_configuration \
          "${TIMEOUT_SECONDS}" "${POLL_SECONDS}" \
          "${MAX_ATTEMPTS}" "${REQUIRED_CONSECUTIVE}"

        echo "Scaling ECS service ${ECS_SERVICE} in cluster ${ECS_CLUSTER} to desired count ${DESIRED_COUNT}..."
        aws ecs update-service \
          --region "${AWS_REGION}" \
          --cluster "${ECS_CLUSTER}" \
          --service "${ECS_SERVICE}" \
          --desired-count "${DESIRED_COUNT}" \
          > /dev/null

        if readiness_poll_until_stable \
            "${PING_URL}" "${EXPECTED_TEXT}" \
            "${TIMEOUT_SECONDS}" "${POLL_SECONDS}" \
            "${MAX_ATTEMPTS}" "${REQUIRED_CONSECUTIVE}"; then
          echo "::notice ::${PING_URL} satisfied its response expectation stably after ${READINESS_ATTEMPTS} attempt(s) and ${READINESS_ELAPSED_SECONDS}s."
          exit 0
        fi

        echo "::error ::Readiness timeout: ${PING_URL} did not satisfy its response expectation stably within the hard ${TIMEOUT_SECONDS}s deadline (attempts=${READINESS_ATTEMPTS}, consecutive=${READINESS_CONSECUTIVE}/${REQUIRED_CONSECUTIVE}, response_state=${READINESS_LAST_RESPONSE_STATE}, response_bytes=${READINESS_LAST_RESPONSE_BYTES})."
        exit 1
