name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    # Safety net for #269: a test failure can leave a django-q scheduler thread
    # alive, causing the job to hang for ~1h40m. Bound the blast radius.
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Collect static files
        run: uv run python manage.py collectstatic --noinput

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run Django system checks
        # Issue #529: catches PR-time regressions where someone breaks the
        # check itself (e.g. by removing the TESTING short-circuit in
        # email_app/checks.py). SES_ENABLED=true here is a wiring check on
        # the source tree, not a platform-env check. SECRET_KEY is a
        # synthetic CI value — settings.py rejects an unset SECRET_KEY
        # when DEBUG=False so the check would never get to run without
        # one; the value is not used to sign anything real.
        env:
          DEBUG: "False"
          SES_ENABLED: "true"
          SECRET_KEY: "ci-system-check-only-not-a-real-secret"
        run: uv run python manage.py check --fail-level ERROR

      - name: Cache test database
        # Issue #532: DJANGO_TEST_DB_NAME below moves Django's SQLite test
        # database off the default in-memory URI so --keepdb has files to
        # preserve between runs. The cache key hashes every migration file in
        # the tree so migration edits trigger a fresh rebuild.
        uses: actions/cache@v4
        with:
          path: |
            test_db.sqlite3
            test_db*.sqlite3
            test_db*.sqlite3-wal
            test_db*.sqlite3-shm
          key: test-db-v2-${{ runner.os }}-py3.13-${{ hashFiles('**/migrations/*.py') }}

      - name: Validate cached test database
        # Issue #533: a restored --keepdb SQLite file can have migrations
        # marked applied while data-migration seed rows are missing. If the
        # canonical tiers are absent, discard the stale cache so Django builds
        # a fresh test database from migrations.
        run: |
          if ! compgen -G 'test_db*.sqlite3' > /dev/null; then
            exit 0
          fi
          if uv run python - <<'PY'
          import glob
          import sqlite3
          import sys

          required = {"free", "basic", "main", "premium"}
          for path in glob.glob("test_db*.sqlite3"):
              try:
                  with sqlite3.connect(path) as conn:
                      rows = conn.execute(
                          "select slug from payments_tier where slug in (?, ?, ?, ?)",
                          tuple(sorted(required)),
                      ).fetchall()
              except sqlite3.DatabaseError:
                  sys.exit(1)
              slugs = {row[0] for row in rows}
              if slugs != required:
                  sys.exit(1)
          PY
          then
            exit 0
          fi
          rm -f test_db.sqlite3 test_db*.sqlite3 test_db*.sqlite3-wal test_db*.sqlite3-shm

      - name: Run unit and integration tests
        # Explicit 4 matches ubuntu-latest vCPU count; was 'auto' before #342.
        # Issue #532: DJANGO_TEST_DB_NAME makes SQLite tests file-backed so
        # --keepdb can reuse the cached test_db*.sqlite3 files.
        env:
          DJANGO_TEST_DB_NAME: test_db.sqlite3
        run: uv run python manage.py test --parallel 4 --keepdb

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Playwright tests
        run: uv run pytest playwright_tests/ -v
