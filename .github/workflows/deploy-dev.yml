name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "deploy/**"
      - ".claude/**"
      - "_docs/**"
      - "specs/**"
      - ".prod-versions"
      - "*.md"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run unit and integration tests
        run: uv run python manage.py test

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      AWS_REGION: eu-west-1
      REPO_ROOT: 387546586013.dkr.ecr.eu-west-1.amazonaws.com
      REPO_URI: 387546586013.dkr.ecr.eu-west-1.amazonaws.com/ai-shipping-labs

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare tags
        id: prep
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)
          echo "TAG=${DATE}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build Docker image
        run: docker build -t ai-shipping-labs:${{ env.TAG }} .

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.REPO_ROOT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Push Docker image to ECR
        run: |
          docker tag ai-shipping-labs:${{ env.TAG }} ${{ env.REPO_URI }}:${{ env.TAG }}
          docker push ${{ env.REPO_URI }}:${{ env.TAG }}

      - name: Deploy to Dev
        run: bash deploy/deploy_dev.sh ${{ env.TAG }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
