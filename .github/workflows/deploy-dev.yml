name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "_docs/**"
      - "specs/**"
      - ".prod-versions"
      - "*.md"

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    # Safety net for #269: a test failure can leave a django-q scheduler thread
    # alive, causing the job to hang for ~1h40m. Bound the blast radius.
    timeout-minutes: 30

    steps:
      - name: Start CI timing profile
        run: |
          now=$(date +%s)
          echo "CI_JOB_START=${now}" >> "$GITHUB_ENV"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"
          echo "CI_TIMING phase=job_start epoch=${now} sha=${GITHUB_SHA}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Report checkout timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=checkout seconds=$((now - CI_PHASE_START)) source=runner_clock"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Report setup-uv timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=setup_uv seconds=$((now - CI_PHASE_START)) source=runner_clock"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Report setup-python timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=setup_python seconds=$((now - CI_PHASE_START)) source=runner_clock"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          start=$(date +%s)
          uv sync
          end=$(date +%s)
          echo "CI_TIMING phase=uv_sync seconds=$((end - start))"

      - name: Collect static files
        run: |
          start=$(date +%s)
          uv run python manage.py collectstatic --noinput
          end=$(date +%s)
          echo "CI_TIMING phase=collectstatic seconds=$((end - start))"

      - name: Run Django system checks
        # Issue #529: gate deploys on `manage.py check --fail-level ERROR`
        # so a misconfiguration that trips a registered system check (e.g.
        # email_app.E001 when SES is disabled in a prod-like env) blocks
        # promotion before the image is built. SES_ENABLED=true here is a
        # wiring check on the source tree; the platform-env enforcement
        # happens in entrypoint.sh against real ECS task-def env vars.
        # SECRET_KEY is a synthetic CI value; settings.py rejects an
        # unset SECRET_KEY when DEBUG=False so the check would never get
        # to run without one; the value is not used to sign anything real.
        env:
          DEBUG: "False"
          SES_ENABLED: "true"
          SECRET_KEY: "ci-system-check-only-not-a-real-secret"
        run: |
          start=$(date +%s)
          uv run python manage.py check --fail-level ERROR
          end=$(date +%s)
          echo "CI_TIMING phase=django_check seconds=$((end - start))"

      - name: Start test database cache restore timing
        run: echo "CI_PHASE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Cache test database
        id: test-db-cache
        # Issue #532: DJANGO_TEST_DB_NAME below moves Django's SQLite test
        # database off the default in-memory URI so --keepdb has files to
        # preserve between runs. The cache key hashes every migration file in
        # the tree so migration edits trigger a fresh rebuild.
        uses: actions/cache@v4
        with:
          path: |
            test_db.sqlite3
            test_db*.sqlite3
            test_db*.sqlite3-wal
            test_db*.sqlite3-shm
          key: test-db-v2-${{ runner.os }}-py3.13-${{ hashFiles('**/migrations/*.py') }}

      - name: Report test database cache restore timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=test_db_cache_restore seconds=$((now - CI_PHASE_START)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }}"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Validate cached test database
        # Issue #533: a restored --keepdb SQLite file can have migrations
        # marked applied while data-migration seed rows are missing. If the
        # canonical tiers are absent, discard the stale cache so Django builds
        # a fresh test database from migrations.
        run: |
          start=$(date +%s)
          deleted=false
          if ! compgen -G 'test_db*.sqlite3' > /dev/null; then
            end=$(date +%s)
            echo "CI_TIMING phase=cached_test_db_validation seconds=$((end - start)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }} restored_files=0 deleted=${deleted}"
            exit 0
          fi
          restored_files=$(find . -maxdepth 1 -name 'test_db*.sqlite3' | wc -l | tr -d ' ')
          if uv run python - <<'PY'
          import glob
          import sqlite3
          import sys

          required = {"free", "basic", "main", "premium"}
          for path in glob.glob("test_db*.sqlite3"):
              try:
                  with sqlite3.connect(path) as conn:
                      rows = conn.execute(
                          "select slug from payments_tier where slug in (?, ?, ?, ?)",
                          tuple(sorted(required)),
                      ).fetchall()
              except sqlite3.DatabaseError:
                  sys.exit(1)
              slugs = {row[0] for row in rows}
              if slugs != required:
                  sys.exit(1)
          PY
          then
            end=$(date +%s)
            echo "CI_TIMING phase=cached_test_db_validation seconds=$((end - start)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }} restored_files=${restored_files} deleted=${deleted}"
            exit 0
          fi
          rm -f test_db.sqlite3 test_db*.sqlite3 test_db*.sqlite3-wal test_db*.sqlite3-shm
          deleted=true
          end=$(date +%s)
          echo "CI_TIMING phase=cached_test_db_validation seconds=$((end - start)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }} restored_files=${restored_files} deleted=${deleted}"

      - name: Run unit and integration tests
        # Explicit 4 matches ubuntu-latest vCPU count; was 'auto' before #342.
        # Issue #532: DJANGO_TEST_DB_NAME makes SQLite tests file-backed so
        # --keepdb can reuse the cached test_db*.sqlite3 files.
        env:
          DJANGO_TEST_DB_NAME: test_db.sqlite3
        run: |
          set -o pipefail
          start=$(date +%s)
          set +e
          uv run python manage.py test --parallel 4 --keepdb 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          set -e
          end=$(date +%s)
          runner_seconds=$(sed -nE 's/^Ran [0-9]+ tests in ([0-9.]+)s$/\1/p' test-output.log | tail -1)
          echo "CI_TIMING phase=test_wall seconds=$((end - start))"
          if [ -n "${runner_seconds}" ]; then
            echo "CI_TIMING phase=test_runner seconds=${runner_seconds}"
          else
            echo "CI_TIMING phase=test_runner seconds=unavailable"
          fi
          exit "${status}"

      - name: Report total job timing
        if: always()
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=job_total seconds=$((now - CI_JOB_START)) source=runner_clock_excludes_post_job_steps"
          echo "CI_TIMING phase=post_job_overhead seconds=unavailable source=github_actions_native_step_timings note=cache_save_and_action_post_steps_run_after_final_step"

  playwright-core:
    name: Playwright Core E2E
    runs-on: ubuntu-latest
    # Reality check: 601 tests in the core partition take ~15-20 min wall time,
    # not the <5 min the original spec assumed. 30 min budget matches the
    # scheduled full-suite job. Marked continue-on-error temporarily so
    # 14 known pre-existing failures in the core set do not block deploys
    # while they are triaged. Re-enable as a hard gate once the core set
    # is rescoped + flakes triaged (follow-up issue tracks both).
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Playwright core tests
        run: uv run pytest -m core playwright_tests/ -v

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test, playwright-core]
    if: github.ref == 'refs/heads/main'

    env:
      AWS_REGION: eu-west-1
      REPO_ROOT: 387546586013.dkr.ecr.eu-west-1.amazonaws.com
      REPO_URI: 387546586013.dkr.ecr.eu-west-1.amazonaws.com/ai-shipping-labs

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare tags
        id: prep
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)
          echo "TAG=${DATE}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build Docker image
        run: docker build -t ai-shipping-labs:${{ env.TAG }} .

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.REPO_ROOT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Push Docker image to ECR
        run: |
          docker tag ai-shipping-labs:${{ env.TAG }} ${{ env.REPO_URI }}:${{ env.TAG }}
          docker push ${{ env.REPO_URI }}:${{ env.TAG }}

      - name: Deploy to Dev
        run: bash deploy/deploy_dev.sh ${{ env.TAG }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Verify deploy landed
        run: |
          set -e
          EXPECTED_HASH=${GITHUB_SHA:0:7}
          MAX_ATTEMPTS=30      # 30 × 10s = 5 min total
          SLEEP_SECONDS=10
          DEPLOYED=""
          echo "Polling https://dev.aishippinglabs.com/ping for version matching ${EXPECTED_HASH}..."
          for i in $(seq 1 ${MAX_ATTEMPTS}); do
            DEPLOYED=$(curl -fsSL --max-time 10 https://dev.aishippinglabs.com/ping 2>/dev/null || echo "")
            if [ -n "${DEPLOYED}" ] && echo "${DEPLOYED}" | grep -qE "${EXPECTED_HASH}"; then
              echo "::notice ::Dev verified — /ping returned ${DEPLOYED} (matches commit ${EXPECTED_HASH}) after ${i} attempt(s)."
              exit 0
            fi
            echo "Attempt ${i}/${MAX_ATTEMPTS}: /ping returned '${DEPLOYED:-<unreachable>}'; expected ${EXPECTED_HASH}. Sleeping ${SLEEP_SECONDS}s..."
            sleep ${SLEEP_SECONDS}
          done
          echo "::error ::Verification timeout — /ping never returned ${EXPECTED_HASH} after $((MAX_ATTEMPTS * SLEEP_SECONDS))s. Last seen: '${DEPLOYED:-<unreachable>}'."
          echo "Possible causes: ECS rollout stalled, ALB cutover is slower than expected, or the new tasks are unhealthy."
          exit 1
