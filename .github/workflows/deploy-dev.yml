name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "_docs/**"
      - "specs/**"
      - ".prod-versions"
      - "*.md"

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One-time deploy gates (#888): these are independent of the test suite and
  # must NOT be duplicated across every test shard. They run once here while the
  # sharded `test` matrix runs the suite. A failure in any of them still blocks
  # deploy because the `deploy` job `needs:` this job.
  checks:
    name: Deploy Gates (migrations / OpenAPI / system check / static)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Start CI timing profile
        run: |
          now=$(date +%s)
          echo "CI_JOB_START=${now}" >> "$GITHUB_ENV"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"
          echo "CI_TIMING phase=job_start job=checks epoch=${now} sha=${GITHUB_SHA}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # We use `--locked` so any drift between pyproject.toml and uv.lock
      # fails the install step loudly with "requirements are unsatisfiable"
      # rather than silently re-resolving (which `--frozen` would mask: it
      # exits 0 on drift in uv 0.10.11). `--locked` asserts the lock is
      # already in sync with pyproject.toml and refuses to mutate it — so
      # the install is deterministic AND drift is a hard failure. The flags
      # `--frozen` and `--locked` are mutually exclusive in uv 0.10.11, so
      # we cannot combine them. If this step fails with "requirements are
      # unsatisfiable" or "lockfile out of date", regenerate uv.lock locally
      # with `uv sync` and commit it. Refs #657.
      - name: Install dependencies
        run: |
          start=$(date +%s)
          uv sync --locked
          end=$(date +%s)
          echo "CI_TIMING phase=uv_sync seconds=$((end - start))"

      # Issue #787: catches model/migration drift before deploy. If a developer
      # edits a model field (e.g. help_text, choices, max_length) without
      # running `makemigrations`, this step fails loudly. Re-homed to
      # deploy-dev.yml (not ci.yml) for the same reason as the OpenAPI drift
      # gate: ci.yml is pull_request-only and this project uses local merges.
      - name: Check for missing migrations
        run: |
          start=$(date +%s)
          uv run python manage.py makemigrations --check --dry-run
          end=$(date +%s)
          echo "CI_TIMING phase=makemigrations_check seconds=$((end - start))"

      # Issue #722: the committed _docs/openapi.json must match what the
      # @openapi_spec decorators currently describe. CI fails the build
      # if a developer edits a decorator without regenerating the spec.
      # Re-homed from ci.yml in #739 — ci.yml is pull_request-only and
      # this project uses local merges, so the gate never fired there.
      - name: Check OpenAPI spec drift
        run: |
          start=$(date +%s)
          make check-openapi-drift
          end=$(date +%s)
          echo "CI_TIMING phase=check_openapi_drift seconds=$((end - start))"

      - name: Collect static files
        run: |
          start=$(date +%s)
          uv run python manage.py collectstatic --noinput
          end=$(date +%s)
          echo "CI_TIMING phase=collectstatic seconds=$((end - start))"

      - name: Run Django system checks
        # Issue #529: gate deploys on `manage.py check --fail-level ERROR`
        # so a misconfiguration that trips a registered system check (e.g.
        # email_app.E001 when SES is disabled in a prod-like env) blocks
        # promotion before the image is built. SES_ENABLED=true here is a
        # wiring check on the source tree; the platform-env enforcement
        # happens in entrypoint.sh against real ECS task-def env vars.
        # SECRET_KEY is a synthetic CI value; settings.py rejects an
        # unset SECRET_KEY when DEBUG=False so the check would never get
        # to run without one; the value is not used to sign anything real.
        env:
          DEBUG: "False"
          SES_ENABLED: "true"
          SECRET_KEY: "ci-system-check-only-not-a-real-secret"
        run: |
          start=$(date +%s)
          uv run python manage.py check --fail-level ERROR
          end=$(date +%s)
          echo "CI_TIMING phase=django_check seconds=$((end - start))"

      - name: Report total job timing
        if: always()
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=job_total job=checks seconds=$((now - CI_JOB_START)) source=runner_clock_excludes_post_job_steps"

  test:
    name: Unit & Integration Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    # Sharded test matrix (#888). The Django suite grew to ~9908 tests / ~1760s
    # (~29m) in a single job and was creeping toward the timeout — run
    # 27158919559 passed ("Ran 9908 tests ... OK") then got cancelled at the
    # cap, skipping deploy. Instead of just raising the ceiling we fan the
    # suite out across N runners. Each shard runs a deterministic, disjoint
    # subset (see website/test_runner.py: SHA-256(test id) % N), so the wall
    # time is ~1/N and the suite stays under cap as it grows. To change N,
    # edit the `shard` list below to 1..N and TEST_SHARD_COUNT to N — nothing
    # else is pinned to a specific N. The deterministic split guarantees the
    # summed per-shard "Ran N tests" counts equal the single-job count (no test
    # run twice, none dropped).
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TEST_SHARD_COUNT: "4"
      TEST_SHARD_INDEX: ${{ matrix.shard }}
    # Per-shard #269 hang safety net. Each shard runs ~1/4 of the suite
    # (~7-8m test runtime + ~2-3m setup), so 20m leaves >40% headroom while
    # keeping the django-q-hang blast radius (#269) far below the historical
    # ~1h40m worst case — much tighter than the old single-job 45m cap.
    timeout-minutes: 20

    steps:
      - name: Start CI timing profile
        run: |
          now=$(date +%s)
          echo "CI_JOB_START=${now}" >> "$GITHUB_ENV"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"
          echo "CI_TIMING phase=job_start shard=${{ matrix.shard }}/${{ strategy.job-total }} epoch=${now} sha=${GITHUB_SHA}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Report checkout timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=checkout seconds=$((now - CI_PHASE_START)) source=runner_clock"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Report setup-uv timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=setup_uv seconds=$((now - CI_PHASE_START)) source=runner_clock"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Report setup-python timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=setup_python seconds=$((now - CI_PHASE_START)) source=runner_clock"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      # See the install-step comment in the `checks` job for why `--locked`.
      - name: Install dependencies
        run: |
          start=$(date +%s)
          uv sync --locked
          end=$(date +%s)
          echo "CI_TIMING phase=uv_sync seconds=$((end - start))"

      - name: Start test database cache restore timing
        run: echo "CI_PHASE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Cache test database
        id: test-db-cache
        # Issue #532: DJANGO_TEST_DB_NAME below moves Django's SQLite test
        # database off the default in-memory URI so --keepdb has files to
        # preserve between runs. The cache key hashes every migration file in
        # the tree so migration edits trigger a fresh rebuild. The per-shard
        # `shard${{ matrix.shard }}` key suffix (#888) gives each matrix job
        # its own cache entry so concurrent shards don't race on cache save.
        uses: actions/cache@v5
        with:
          path: |
            test_db.sqlite3
            test_db*.sqlite3
            test_db*.sqlite3-wal
            test_db*.sqlite3-shm
          key: test-db-v2-${{ runner.os }}-py3.13-shard${{ matrix.shard }}-${{ hashFiles('**/migrations/*.py') }}

      - name: Report test database cache restore timing
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=test_db_cache_restore seconds=$((now - CI_PHASE_START)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }}"
          echo "CI_PHASE_START=${now}" >> "$GITHUB_ENV"

      - name: Validate cached test database
        # Issue #533: a restored --keepdb SQLite file can have migrations
        # marked applied while data-migration seed rows are missing. If the
        # canonical tiers are absent, discard the stale cache so Django builds
        # a fresh test database from migrations.
        run: |
          start=$(date +%s)
          deleted=false
          if ! compgen -G 'test_db*.sqlite3' > /dev/null; then
            end=$(date +%s)
            echo "CI_TIMING phase=cached_test_db_validation seconds=$((end - start)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }} restored_files=0 deleted=${deleted}"
            exit 0
          fi
          restored_files=$(find . -maxdepth 1 -name 'test_db*.sqlite3' | wc -l | tr -d ' ')
          if uv run python - <<'PY'
          import glob
          import sqlite3
          import sys

          required = {"free", "basic", "main", "premium"}
          for path in glob.glob("test_db*.sqlite3"):
              try:
                  with sqlite3.connect(path) as conn:
                      rows = conn.execute(
                          "select slug from payments_tier where slug in (?, ?, ?, ?)",
                          tuple(sorted(required)),
                      ).fetchall()
              except sqlite3.DatabaseError:
                  sys.exit(1)
              slugs = {row[0] for row in rows}
              if slugs != required:
                  sys.exit(1)
          PY
          then
            end=$(date +%s)
            echo "CI_TIMING phase=cached_test_db_validation seconds=$((end - start)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }} restored_files=${restored_files} deleted=${deleted}"
            exit 0
          fi
          rm -f test_db.sqlite3 test_db*.sqlite3 test_db*.sqlite3-wal test_db*.sqlite3-shm
          deleted=true
          end=$(date +%s)
          echo "CI_TIMING phase=cached_test_db_validation seconds=$((end - start)) cache_hit=${{ steps.test-db-cache.outputs.cache-hit }} restored_files=${restored_files} deleted=${deleted}"

      - name: Run unit and integration tests
        # Issue #762: --parallel is back. The 'cannot pickle traceback' worker
        # crash is now fixed by website/test_runner.py::PicklableTracebackRunner
        # which installs tblib's pickling support, so workers can ship failure
        # tracebacks back to the parent without crashing the IPC.
        # Issue #532: DJANGO_TEST_DB_NAME makes SQLite tests file-backed so
        # --keepdb can reuse the cached test_db*.sqlite3 files.
        # Issue #888: TEST_SHARD_COUNT/TEST_SHARD_INDEX (job-level env) make the
        # runner keep only this shard's deterministic subset. `--parallel 4`
        # matches the GitHub-hosted ubuntu-latest 4-vCPU runner — do NOT raise
        # it above the runner's vCPU count (oversubscription thrashes); the
        # sharding matrix is the lever for scaling, not intra-job parallelism.
        env:
          DJANGO_TEST_DB_NAME: test_db.sqlite3
        run: |
          set -o pipefail
          start=$(date +%s)
          set +e
          uv run python manage.py test --parallel 4 --exclude-tag=visual_regression --keepdb 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          set -e
          end=$(date +%s)
          runner_seconds=$(sed -nE 's/^Ran [0-9]+ tests in ([0-9.]+)s$/\1/p' test-output.log | tail -1)
          echo "CI_TIMING phase=test_wall shard=${{ matrix.shard }}/${{ strategy.job-total }} seconds=$((end - start))"
          if [ -n "${runner_seconds}" ]; then
            echo "CI_TIMING phase=test_runner shard=${{ matrix.shard }}/${{ strategy.job-total }} seconds=${runner_seconds}"
          else
            echo "CI_TIMING phase=test_runner shard=${{ matrix.shard }}/${{ strategy.job-total }} seconds=unavailable"
          fi
          exit "${status}"

      - name: Report total job timing
        if: always()
        run: |
          now=$(date +%s)
          echo "CI_TIMING phase=job_total shard=${{ matrix.shard }}/${{ strategy.job-total }} seconds=$((now - CI_JOB_START)) source=runner_clock_excludes_post_job_steps"
          echo "CI_TIMING phase=post_job_overhead seconds=unavailable source=github_actions_native_step_timings note=cache_save_and_action_post_steps_run_after_final_step"

  playwright-core:
    name: Playwright Core E2E
    runs-on: ubuntu-latest
    # The core partition is the deploy-critical Playwright smoke set. The
    # scheduled workflow owns the full long-tail suite.
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Playwright core tests
        run: uv run pytest -m "core and not manual_visual and not legacy_checkout and not slow_platform and not visual_regression" playwright_tests/ -v

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    # #888: deploy gates on every test shard plus the one-time `checks` job and
    # the Playwright core set. A `needs` array entry only succeeds when ALL of a
    # matrix job's shards succeed, so listing `test` here means deploy runs only
    # when all 4 shards are green.
    needs: [checks, test, playwright-core]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write # assume the AWS deploy role via OIDC

    env:
      AWS_REGION: eu-west-1
      REPO_ROOT: 387546586013.dkr.ecr.eu-west-1.amazonaws.com
      REPO_URI: 387546586013.dkr.ecr.eu-west-1.amazonaws.com/ai-shipping-labs

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::387546586013:role/website-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare tags
        id: prep
        run: |
          DATE=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)
          echo "TAG=${DATE}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build Docker image
        run: docker build -t ai-shipping-labs:${{ env.TAG }} .

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.REPO_ROOT }}

      - name: Push Docker image to ECR
        run: |
          docker tag ai-shipping-labs:${{ env.TAG }} ${{ env.REPO_URI }}:${{ env.TAG }}
          docker push ${{ env.REPO_URI }}:${{ env.TAG }}

      - name: Deploy to Dev
        run: bash deploy/deploy_dev.sh ${{ env.TAG }}
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Verify deploy landed
        run: |
          set -e
          EXPECTED_HASH=${GITHUB_SHA:0:7}
          MAX_ATTEMPTS=30      # 30 × 10s = 5 min total
          SLEEP_SECONDS=10
          DEPLOYED=""
          echo "Polling https://dev.aishippinglabs.com/ping for version matching ${EXPECTED_HASH}..."
          for i in $(seq 1 ${MAX_ATTEMPTS}); do
            DEPLOYED=$(curl -fsSL --max-time 10 https://dev.aishippinglabs.com/ping 2>/dev/null || echo "")
            if [ -n "${DEPLOYED}" ] && echo "${DEPLOYED}" | grep -qE "${EXPECTED_HASH}"; then
              echo "::notice ::Dev verified — /ping returned ${DEPLOYED} (matches commit ${EXPECTED_HASH}) after ${i} attempt(s)."
              exit 0
            fi
            echo "Attempt ${i}/${MAX_ATTEMPTS}: /ping returned '${DEPLOYED:-<unreachable>}'; expected ${EXPECTED_HASH}. Sleeping ${SLEEP_SECONDS}s..."
            sleep ${SLEEP_SECONDS}
          done
          echo "::error ::Verification timeout — /ping never returned ${EXPECTED_HASH} after $((MAX_ATTEMPTS * SLEEP_SECONDS))s. Last seen: '${DEPLOYED:-<unreachable>}'."
          echo "Possible causes: ECS rollout stalled, ALB cutover is slower than expected, or the new tasks are unhealthy."
          exit 1
