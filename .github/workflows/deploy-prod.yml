name: Manual Production Deployment

on:
  workflow_dispatch:
    inputs:
      confirmProdDeploy:
        type: boolean
        description: "Confirm deployment to production"
        required: true
        default: false
      deployTag:
        type: string
        description: "Tag to deploy to production (optional, defaults to current dev tag)"
        required: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # The "Commit and push .prod-versions" step writes to main; the
    # default GITHUB_TOKEN is read-only without this. Run 25051473553
    # failed at that step with a 403 because of the missing grant.
    permissions:
      contents: write

    env:
      AWS_REGION: eu-west-1
      # Hostname the verify step polls. The apex DNS cutover has happened —
      # production users land on the apex, and `prod.aishippinglabs.com` is
      # a legacy alias that may be retired.
      PROD_HOST: aishippinglabs.com

    steps:
      - name: Echo Inputs
        run: |
          echo "Confirm Production Deploy: ${{ github.event.inputs.confirmProdDeploy }}"
          echo "Deploy Tag: ${{ github.event.inputs.deployTag }}"

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run Django system checks
        # Issue #529: verify the source tree being deployed passes its own
        # `manage.py check --fail-level ERROR`. SES_ENABLED=true here is a
        # wiring check on the source tree; the prod-env enforcement is
        # provided by entrypoint.sh running inside the new ECS task.
        # SECRET_KEY is a synthetic CI value — settings.py rejects an
        # unset SECRET_KEY when DEBUG=False so the check would never get
        # to run without one; the value is not used to sign anything real.
        env:
          DEBUG: "False"
          SES_ENABLED: "true"
          SECRET_KEY: "ci-system-check-only-not-a-real-secret"
        run: uv run python manage.py check --fail-level ERROR

      - name: Deploy to Production
        run: bash deploy/deploy_prod.sh ${{ github.event.inputs.deployTag }}
        env:
          CONFIRM_DEPLOY: ${{ github.event.inputs.confirmProdDeploy }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Verify prod deploy landed
        run: |
          set -e
          EXPECTED_TAG="${{ github.event.inputs.deployTag }}"
          if [ -z "$EXPECTED_TAG" ]; then
            EXPECTED_TAG=$(tail -n1 .prod-versions)
          fi
          echo "Polling https://${PROD_HOST}/ping for tag matching ${EXPECTED_TAG}..."
          for i in $(seq 1 30); do
            DEPLOYED=$(curl -fsSL --max-time 10 "https://${PROD_HOST}/ping" 2>/dev/null || echo "")
            if [ -n "${DEPLOYED}" ] && [ "${DEPLOYED}" = "${EXPECTED_TAG}" ]; then
              echo "::notice ::Prod verified — /ping returned ${DEPLOYED} after ${i} attempt(s)."
              exit 0
            fi
            echo "Attempt ${i}/30: prod /ping returned '${DEPLOYED:-<unreachable>}'; expected ${EXPECTED_TAG}. Sleeping 10s..."
            sleep 10
          done
          echo "::error ::Prod verification timeout — /ping never returned ${EXPECTED_TAG}."
          exit 1

      - name: Commit and push .prod-versions
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Rebase any commits that landed on main while we were deploying so
          # our push isn't rejected as a non-fast-forward.
          git pull --rebase origin main
          git add .prod-versions
          if git diff --cached --quiet; then
            echo "No changes to .prod-versions (already on main); skipping commit."
            exit 0
          fi
          git commit -m "Update production versions: ${{ github.event.inputs.deployTag || 'auto-detected' }}"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto latest main and retrying."
            git pull --rebase origin main
          done
          echo "::error ::Failed to push .prod-versions after 5 attempts."
          exit 1
