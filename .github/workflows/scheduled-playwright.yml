name: Scheduled Playwright (full suite)

on:
  schedule:
    # Every 3 hours. The skip-if-unchanged guard below makes the tighter
    # cadence cost-free during idle periods (issue #617 user update).
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      include_excluded:
        description: "Also run manual_visual / legacy_checkout / slow_platform marker suites"
        required: false
        type: boolean
        default: false

concurrency:
  group: scheduled-playwright
  cancel-in-progress: true

env:
  PLAYWRIGHT_DEFAULT_MARKERS: not manual_visual and not legacy_checkout and not slow_platform

jobs:
  changes:
    name: Change Gate
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changed.outputs.skip }}

    steps:
      - name: Skip if no new commits since last successful run
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # workflow_dispatch always runs the suite (manual override).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch - running suite regardless of SHA."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the most recent successful run of THIS workflow (excluding
          # the current run, which is already 'in_progress').
          PREVIOUS_SHA=$(gh run list \
            --workflow scheduled-playwright.yml \
            --status success \
            --limit 1 \
            --json headSha,conclusion \
            --jq '.[0].headSha // ""')

          if [ -z "${PREVIOUS_SHA}" ]; then
            echo "No prior successful run found (first-ever run) - proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${PREVIOUS_SHA}" = "${GITHUB_SHA}" ]; then
            echo "::notice::No new commits since last successful run (${PREVIOUS_SHA}); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Previous successful SHA: ${PREVIOUS_SHA}; current: ${GITHUB_SHA}; proceeding."
          echo "skip=false" >> "$GITHUB_OUTPUT"

  playwright-full:
    name: Playwright Full Suite (${{ matrix.shard_name }})
    needs: changes
    if: needs.changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: shard 1/4
            shard_index: 0
            shard_total: 4
          - shard_name: shard 2/4
            shard_index: 1
            shard_total: 4
          - shard_name: shard 3/4
            shard_index: 2
            shard_total: 4
          - shard_name: shard 4/4
            shard_index: 3
            shard_total: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Select Playwright shard files
        id: shard
        shell: bash
        run: |
          mapfile -t files < <(
            find playwright_tests -maxdepth 1 -type f -name 'test_*.py' | sort |
              awk -v shard="${{ matrix.shard_index }}" -v total="${{ matrix.shard_total }}" \
                '((NR - 1) % total) == shard'
          )

          printf '%s\n' "${files[@]}" > .playwright-shard-files
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          printf 'Selected %s files for %s:\n' "${#files[@]}" "${{ matrix.shard_name }}"
          printf '  %s\n' "${files[@]}"

      - name: Run full Playwright shard
        shell: bash
        run: |
          mapfile -t files < .playwright-shard-files
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Playwright files selected for ${{ matrix.shard_name }}."
            exit 0
          fi

          uv run pytest -m "${PLAYWRIGHT_DEFAULT_MARKERS}" "${files[@]}" -v

  playwright-excluded-markers:
    name: Playwright Excluded Marker Suites
    needs: changes
    if: github.event_name == 'workflow_dispatch' && inputs.include_excluded && needs.changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run excluded Playwright marker suites
        run: uv run pytest -m "manual_visual or legacy_checkout or slow_platform" playwright_tests/ -v

  notify:
    name: Scheduled Playwright Failure Issue
    needs: [changes, playwright-full, playwright-excluded-markers]
    if: always() && needs.changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write

    steps:
      - name: Open or update failure issue
        if: contains(toJSON(needs.*.result), 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_TITLE: "[CI] Scheduled Playwright full suite failing"
        shell: bash
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          failed_jobs=$(gh run view "${GITHUB_RUN_ID}" \
            --json jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | "- " + .name' || true)
          if [ -z "${failed_jobs}" ]; then
            failed_jobs="- Failure details were not available when this notification ran."
          fi

          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          Scheduled Playwright failed on \`${GITHUB_REF_NAME}\`.

          Run: ${run_url}
          Commit: ${GITHUB_SHA}
          Event: ${GITHUB_EVENT_NAME}

          Failed jobs:
          ${failed_jobs}
          EOF

          issue_number=$(gh issue list \
            --state open \
            --search "${ISSUE_TITLE} in:title" \
            --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
            | head -n 1)

          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --body-file "${body_file}"
          else
            gh issue create --title "${ISSUE_TITLE}" --body-file "${body_file}"
          fi

      - name: Close recovered failure issue
        if: ${{ !contains(toJSON(needs.*.result), 'failure') }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_TITLE: "[CI] Scheduled Playwright full suite failing"
        shell: bash
        run: |
          issue_number=$(gh issue list \
            --state open \
            --search "${ISSUE_TITLE} in:title" \
            --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
            | head -n 1)

          if [ -z "${issue_number}" ]; then
            exit 0
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue close "${issue_number}" \
            --comment "Scheduled Playwright recovered on \`${GITHUB_REF_NAME}\`: ${run_url}"
