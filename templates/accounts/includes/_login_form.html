<form id="login-form" class="space-y-4 mb-6" onsubmit="return handleLogin(event)" aria-busy="false">
  <div>
    <label for="login-email" class="block text-sm font-medium text-foreground mb-1">Email</label>
    <input type="email" id="login-email" name="email" required
           class="w-full rounded-md border border-border bg-background px-4 py-2.5 text-base text-foreground placeholder-muted-foreground focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
           placeholder="you@example.com">
  </div>
  <div>
    <label for="login-password" class="block text-sm font-medium text-foreground mb-1">Password</label>
    <input type="password" id="login-password" name="password" required
           class="w-full rounded-md border border-border bg-background px-4 py-2.5 text-base text-foreground placeholder-muted-foreground focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
           placeholder="Your password">
  </div>
  <div id="login-error" class="text-sm text-red-400 hidden"></div>
  <button type="submit" id="login-submit"
          class="w-full rounded-md bg-accent px-4 py-2.5 text-sm font-medium text-accent-foreground transition-colors hover:bg-accent/90 disabled:cursor-not-allowed disabled:opacity-70"
          aria-busy="false"
          data-idle-text="Sign in"
          data-loading-text="Signing in...">
    <span id="login-submit-text">Sign in</span>
  </button>
</form>

<div class="flex flex-wrap items-center justify-between gap-2 mb-4">
  <a href="/accounts/password-reset-request"
     class="text-sm text-accent hover:underline cursor-pointer" id="forgot-password-link">
    Forgot password?
  </a>
  <a href="/register{% if next_url %}?next={{ next_url|urlencode }}{% endif %}" class="text-sm text-accent hover:underline" id="register-link">
    Create account
  </a>
</div>
