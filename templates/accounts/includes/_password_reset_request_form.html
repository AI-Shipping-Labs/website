<form id="password-reset-request-form" class="space-y-4" onsubmit="return handlePasswordResetRequest(event)" aria-busy="false" novalidate>
  <div>
    <label for="password-reset-email" class="block text-sm font-medium text-foreground mb-1">Email</label>
    <input type="email" id="password-reset-email" name="email" required
           value="{{ prefill_email|default:'' }}"
           class="w-full rounded-md border border-border bg-background px-4 py-2.5 text-base text-foreground placeholder-muted-foreground focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
           placeholder="you@example.com">
  </div>
  <div id="password-reset-request-error" class="text-sm text-red-400 hidden"></div>
  <div id="password-reset-request-success" class="text-sm text-green-400 hidden"></div>
  <button type="submit" id="password-reset-request-submit"
          class="w-full rounded-md bg-accent px-4 py-2.5 text-sm font-medium text-accent-foreground transition-colors hover:bg-accent/90 disabled:cursor-not-allowed disabled:opacity-70"
          aria-busy="false"
          data-idle-text="Send reset link"
          data-loading-text="Sending...">
    <span id="password-reset-request-submit-text">Send reset link</span>
  </button>
</form>

<div class="mt-6 text-center">
  <a href="/accounts/login/" class="text-sm text-accent hover:underline">
    Back to sign in
  </a>
</div>
