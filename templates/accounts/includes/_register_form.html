<form id="register-form" class="space-y-4 mb-6" onsubmit="return handleRegister(event)" aria-busy="false">
  <div>
    <label for="register-email" class="block text-sm font-medium text-foreground mb-1">Email</label>
    <input type="email" id="register-email" name="email" required
           class="w-full rounded-md border border-border bg-background px-4 py-2.5 text-base text-foreground placeholder-muted-foreground focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
           placeholder="you@example.com">
  </div>
  <div>
    <label for="register-password" class="block text-sm font-medium text-foreground mb-1">Password</label>
    <input type="password" id="register-password" name="password" required minlength="8"
           class="w-full rounded-md border border-border bg-background px-4 py-2.5 text-base text-foreground placeholder-muted-foreground focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
           placeholder="At least 8 characters">
  </div>
  <div>
    <label for="register-password-confirm" class="block text-sm font-medium text-foreground mb-1">Confirm Password</label>
    <input type="password" id="register-password-confirm" name="password_confirm" required minlength="8"
           class="w-full rounded-md border border-border bg-background px-4 py-2.5 text-base text-foreground placeholder-muted-foreground focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent"
           placeholder="Confirm your password">
  </div>
  <div id="register-error" class="text-sm text-red-400 hidden"></div>
  <div id="register-success" class="text-sm text-green-400 hidden"></div>
  <button type="submit" id="register-submit"
          class="w-full rounded-md bg-accent px-4 py-2.5 text-sm font-medium text-accent-foreground transition-colors hover:bg-accent/90 disabled:cursor-not-allowed disabled:opacity-70"
          aria-busy="false"
          data-idle-text="Create Account"
          data-loading-text="Creating account...">
    <span id="register-submit-text">Create Account</span>
  </button>
</form>

<div class="text-center mb-4">
  <span class="text-sm text-muted-foreground">Already have an account?</span>
  <a href="/accounts/login/" class="text-sm text-accent hover:underline ml-1" id="login-link">Sign in</a>
</div>
