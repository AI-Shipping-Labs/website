<div id="timestamp-editor-{{ widget.name }}" class="timestamp-editor" data-timestamp-editor>
  <input type="hidden" name="{{ widget.name }}" id="id_{{ widget.name }}" value="{{ widget.value }}">

  <table id="timestamp-table-{{ widget.name }}" class="timestamp-editor__table">
    <thead>
      <tr>
        <th class="timestamp-editor__header timestamp-editor__header--number">#</th>
        <th class="timestamp-editor__header timestamp-editor__header--time">Time (MM:SS)</th>
        <th class="timestamp-editor__header">Label</th>
        <th class="timestamp-editor__header timestamp-editor__header--actions">Actions</th>
      </tr>
    </thead>
    <tbody id="timestamp-rows-{{ widget.name }}" data-timestamp-rows>
    </tbody>
  </table>

  <button type="button" id="add-timestamp-{{ widget.name }}" class="timestamp-editor__add" data-timestamp-add>
    + Add Timestamp
  </button>
</div>
