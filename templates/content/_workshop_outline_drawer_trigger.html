{% comment %}
Mobile-only outline drawer trigger (issue #618).

Renders the `[≡] Workshop outline` button that opens the off-canvas
outline drawer on `<lg`. Always invisible on `lg+` (the desktop layout
shows the outline inline below the player).

Paired with `_workshop_outline_drawer_panel.html` — both partials must
be rendered on the page for the drawer to function. The trigger sits
in the mobile flow between the player and the tutorial body so the
user can pop the outline open without scrolling past the body.

Wire-up contract:
- Trigger has `id="workshop-outline-toggle-btn"`.
- `aria-controls="workshop-outline-drawer-panel"` points at the panel.
- The toggle JS lives at the bottom of the panel partial.

Required context: none. Pure structural markup.
{% endcomment %}
<button type="button"
        id="workshop-outline-toggle-btn"
        class="lg:hidden flex w-full items-center justify-between rounded-lg border border-border bg-card px-4 py-2.5 text-sm font-medium text-foreground transition-colors hover:bg-muted"
        aria-controls="workshop-outline-drawer-panel"
        aria-expanded="false"
        data-testid="workshop-outline-toggle">
  <span class="flex items-center gap-2">
    <i data-lucide="menu" class="h-4 w-4"></i>
    Workshop outline
  </span>
  <i data-lucide="chevron-right" class="h-4 w-4"></i>
</button>

{# Overlay — visible only while the drawer is open. Click closes. #}
<div id="workshop-outline-overlay"
     class="hidden fixed inset-y-0 right-0 z-40 w-[calc(100vw-20rem)] bg-background/70 lg:hidden"
     aria-hidden="true"
     data-testid="workshop-outline-overlay"></div>
