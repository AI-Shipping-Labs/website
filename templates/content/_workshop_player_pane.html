{% comment %}
Player pane for the course-player layout (issue #618).

Rendered ONLY for users with recording access — the parent template
omits this include for locked users (defense-in-depth: no <iframe>
markup at all in the rendered HTML, no DevTools bypass).

Sticky on desktop within the left column (`lg:sticky lg:top-24`); on
mobile it sticks to the top of the viewport (`sticky top-0`) so the
video stays visible while the user scrolls the tutorial body.

Required context:
- workshop: Workshop instance.
- player_video_id, player_source_type, player_embed_url: from the view.
- player_start_seconds: optional integer second offset.
- has_recording: True when the workshop has a recording attached.
{% endcomment %}
{% if has_recording and player_source_type %}
<div class="lg:sticky lg:top-24 mb-6 lg:mb-0"
     data-testid="workshop-player-pane">
  <div id="workshop-player-shell"
       class="aspect-video rounded-lg overflow-hidden border border-border bg-black sticky top-0 z-30 lg:relative lg:top-auto lg:z-auto"
       data-source="{{ player_source_type }}"
       data-video-id="{{ player_video_id }}"
       data-embed-url="{{ player_embed_url }}"
       {% if player_start_seconds %}data-start-seconds="{{ player_start_seconds }}"{% endif %}>
    {% comment %}
      Lazy-load placeholder. The JS module hydrates the iframe on first
      interaction (chapter click, page click, badge click, or a tap on
      the play overlay) so we save a YouTube/Loom request for read-only
      visits. Click handler is wired in workshop_player.js.
    {% endcomment %}
    <button type="button"
            id="workshop-player-play-overlay"
            class="absolute inset-0 flex h-full w-full items-center justify-center bg-background/30 text-foreground transition-colors hover:bg-background/40"
            aria-label="Play recording"
            data-testid="workshop-player-play-overlay">
      <span class="flex h-16 w-16 items-center justify-center rounded-full border border-white/30 bg-background/70 backdrop-blur-sm">
        <i data-lucide="play" class="h-7 w-7"></i>
      </span>
    </button>
  </div>
</div>
{% endif %}
