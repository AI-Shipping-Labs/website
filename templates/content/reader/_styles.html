<style>
  @media (min-width: 1024px) {
    #content-sidebar-aside {
      transition: width 200ms ease, opacity 200ms ease, margin 200ms ease;
    }
    /*
      Issue #1080: `overflow: hidden` is only applied while the sidebar is
      collapsing/collapsed. Applying it at rest turned the <aside> into a
      scroll container, which broke `position: sticky` on the inner wrapper
      (it never pinned on scroll) and shifted the wrapper down by the sticky
      `top` offset at rest, leaving a large empty band above the back-link.
      Clipping is only needed when the width animates to 0.
    */
    :root[data-content-sidebar="collapsed"] #content-sidebar-aside {
      width: 0 !important;
      min-width: 0 !important;
      opacity: 0;
      pointer-events: none;
      margin-right: -2rem;
      flex-basis: 0;
      overflow: hidden;
    }
    :root[data-content-sidebar="collapsed"] #content-sidebar-main {
      flex: 0 1 56rem;
      max-width: 56rem;
      margin-left: auto;
      margin-right: auto;
    }
    #content-sidebar-floating-toggle { display: none; }
    :root[data-content-sidebar="collapsed"] #content-sidebar-floating-toggle {
      display: inline-flex;
    }
    #content-sidebar-collapse-btn { display: inline-flex; }
  }
  @media (max-width: 1023px) {
    #content-sidebar-collapse-btn,
    #content-sidebar-floating-toggle { display: none !important; }
  }
  .sidebar-module > summary::-webkit-details-marker,
  .sidebar-module > summary::marker { display: none; }
  .sidebar-module[open] > div { animation: sidebarSlideDown 0.15s ease-out; }
  @keyframes sidebarSlideDown {
    from { opacity: 0; transform: translateY(-2px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
