{% if event_hosts %}
<section class="mt-10 mb-12 border-t border-border pt-8" data-testid="event-hosts">
  <h2 class="mb-5 text-xl font-semibold tracking-tight">Hosted by</h2>
  <div class="grid gap-4 sm:grid-cols-2">
    {% for host in event_hosts %}
    <article class="rounded-lg border border-border bg-card/70 p-4" data-testid="event-host">
      <div class="flex items-start gap-3">
        <img src="{{ host.display_photo_url }}" alt="{{ host.name }}"
             class="h-14 w-14 flex-none rounded-md border border-border object-cover">
        <div class="min-w-0">
          <h3 class="text-base font-semibold text-foreground">{{ host.name }}</h3>
          {% if host.title %}
          <p class="mt-0.5 text-sm text-muted-foreground">{{ host.title }}</p>
          {% endif %}
        </div>
      </div>
      {% if host.bio_html %}
      <div class="prose mt-3 max-w-none text-sm">
        {{ host.bio_html|safe }}
      </div>
      {% endif %}
      {% if host.email %}
      <a href="mailto:{{ host.email }}" class="mt-3 inline-flex text-xs text-muted-foreground transition-colors hover:text-accent hover:underline">{{ host.email }}</a>
      {% endif %}
    </article>
    {% endfor %}
  </div>
</section>
{% endif %}
