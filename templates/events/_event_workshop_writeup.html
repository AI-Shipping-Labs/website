{% if event.kind == 'workshop' %}
  {% with workshop=event.workshop %}
  {% if workshop %}
  <div class="mb-8 rounded-lg border border-accent/30 bg-accent/5 p-5" data-testid="event-workshop-writeup">
    <div class="flex flex-col items-start gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex min-w-0 items-center gap-3">
        <i data-lucide="book-open" class="h-5 w-5 text-accent"></i>
        <div>
          <p class="font-semibold text-foreground">Continue with the workshop writeup</p>
          <p class="text-sm text-muted-foreground">Open the canonical pages, recording, materials, and code repo.</p>
        </div>
      </div>
      <a href="{{ workshop.get_absolute_url }}"
         class="inline-flex items-center gap-2 rounded-lg bg-accent px-4 py-2 text-sm font-semibold text-accent-foreground transition-colors hover:bg-accent/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-background"
         data-testid="event-workshop-writeup-link">
        View workshop writeup
        <i data-lucide="arrow-right" class="h-4 w-4"></i>
      </a>
    </div>
  </div>
  {% endif %}
  {% endwith %}
{% endif %}
