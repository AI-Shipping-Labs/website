{% if transcript_text %}
<div class="{{ section_class|default:'mb-12' }}">
  <h2 class="mb-4 text-2xl font-semibold tracking-tight">Transcript</h2>
  <details class="rounded-lg border border-border bg-card p-4" data-testid="{{ transcript_testid|default:'recording-transcript' }}">
    <summary class="cursor-pointer text-sm font-medium text-foreground">Show transcript</summary>
    <div class="mt-4 max-h-96 overflow-y-auto whitespace-pre-wrap text-sm text-muted-foreground">{{ transcript_text }}</div>
  </details>
</div>
{% endif %}
