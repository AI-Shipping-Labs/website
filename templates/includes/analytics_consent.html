{% load accounts_extras %}
<div id="analytics-consent-spacer"
     class="h-80 sm:h-60{% if analytics_consent_state %} hidden{% endif %}"
     aria-hidden="true"
     data-testid="analytics-consent-spacer"></div>
<aside id="analytics-consent-panel"
       class="fixed inset-x-4 bottom-4 z-[70] mx-auto max-w-2xl rounded-xl border border-border bg-card p-5 shadow-2xl sm:p-6{% if analytics_consent_state %} hidden{% endif %}"
       role="dialog"
       aria-labelledby="analytics-consent-title"
       aria-describedby="analytics-consent-description"
       data-testid="analytics-consent-panel"
       data-consent-state="{{ analytics_consent_state }}"
       data-csrf-token="{{ analytics_consent_csrf_token }}">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h2 id="analytics-consent-title"
          class="text-lg font-semibold text-foreground"
          tabindex="-1">Optional analytics</h2>
      <p id="analytics-consent-description" class="mt-2 text-sm leading-6 text-muted-foreground">
        We use optional analytics to understand how people find and use the site.
        Analytics stays off unless you allow it.
        <a href="/privacy/"
           class="text-accent underline underline-offset-2 hover:text-accent/80 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-background">Learn how we handle analytics data</a>.
      </p>
    </div>
    <button type="button"
            class="{% button_classes 'secondary' size='md' extra='hidden shrink-0' %}"
            data-consent-close
            aria-label="Close analytics preferences">Close</button>
  </div>
  <div class="mt-5 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
    <button type="button"
            class="{% button_classes 'secondary' size='md' %}"
            data-consent-choice="denied"
            data-testid="analytics-consent-deny">Keep analytics off</button>
    <button type="button"
            class="{% button_classes 'primary' size='md' %}"
            data-consent-choice="granted"
            data-testid="analytics-consent-allow">Allow analytics</button>
  </div>
  <p class="mt-3 hidden text-sm text-red-500" role="alert" data-consent-error>
    We could not save your preference. Please try again.
  </p>
</aside>

<script>
  (function() {
    var panel = document.getElementById('analytics-consent-panel');
    if (!panel) return;

    var spacer = document.getElementById('analytics-consent-spacer');
    var closeButton = panel.querySelector('[data-consent-close]');
    var error = panel.querySelector('[data-consent-error]');
    var heading = document.getElementById('analytics-consent-title');
    var savedState = panel.getAttribute('data-consent-state') || '';

    function syncLayout() {
      var clearance = 0;
      if (!panel.classList.contains('hidden')) {
        // The mobile menu is its own scrolling viewport. Reserve the fixed
        // panel height, its 16px bottom inset, and a 16px visual gap so menu
        // controls can never scroll beneath the consent surface.
        clearance = Math.ceil(panel.getBoundingClientRect().height) + 32;
      }
      document.documentElement.style.setProperty(
        '--analytics-consent-clearance', clearance + 'px'
      );
    }

    function setBusy(isBusy) {
      panel.querySelectorAll('[data-consent-choice]').forEach(function(button) {
        button.disabled = isBusy;
      });
    }

    function save(choice) {
      setBusy(true);
      error.classList.add('hidden');
      fetch('/api/analytics/consent', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': panel.getAttribute('data-csrf-token'),
        },
        body: JSON.stringify({consent: choice}),
      })
      .then(function(response) {
        if (!response.ok) throw new Error('Consent save failed');
        return response.json();
      })
      .then(function() { window.location.reload(); })
      .catch(function() {
        setBusy(false);
        error.classList.remove('hidden');
      });
    }

    function open() {
      spacer.classList.remove('hidden');
      panel.classList.remove('hidden');
      if (savedState) {
        closeButton.classList.remove('hidden');
      }
      syncLayout();
      heading.focus();
    }

    function close() {
      if (!savedState) return;
      panel.classList.add('hidden');
      spacer.classList.add('hidden');
      syncLayout();
    }

    panel.querySelectorAll('[data-consent-choice]').forEach(function(button) {
      button.addEventListener('click', function() {
        save(button.getAttribute('data-consent-choice'));
      });
    });
    closeButton.addEventListener('click', close);
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape' && !panel.classList.contains('hidden')) close();
    });

    window.addEventListener('resize', syncLayout, {passive: true});
    if (window.ResizeObserver) {
      new ResizeObserver(syncLayout).observe(panel);
    }
    syncLayout();

    window.analyticsConsentPreferences = {open: open};
  })();
</script>
