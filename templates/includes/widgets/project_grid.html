<div class="grid gap-6 sm:grid-cols-2">
  {% for project in items %}
  <div class="rounded-lg border border-border bg-card p-6">
    <div class="flex items-center gap-3 mb-3">
      <span class="flex h-8 w-8 items-center justify-center rounded-full bg-accent/10 text-accent text-sm font-bold">{{ project.number }}</span>
      <span class="text-xs font-medium
        {% if project.difficulty == 'Foundational' %}text-green-400
        {% elif project.difficulty == 'Intermediate' %}text-yellow-400
        {% elif project.difficulty == 'Advanced' %}text-red-400
        {% else %}text-muted-foreground{% endif %}
      ">{{ project.difficulty }}</span>
    </div>
    <h3 class="text-lg font-semibold text-foreground">{{ project.title }}</h3>
    <p class="mt-2 text-sm text-muted-foreground">{{ project.description }}</p>
    {% if project.skills %}
    <div class="mt-4 flex flex-wrap gap-2">
      {% for skill in project.skills %}
      <span class="rounded-full bg-secondary px-2.5 py-0.5 text-xs text-muted-foreground">{{ skill }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
