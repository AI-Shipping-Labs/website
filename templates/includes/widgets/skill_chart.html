<div class="space-y-10">
  {% for category in items %}
  <div class="rounded-lg border border-border bg-card p-6 lg:p-8">
    <h3 class="text-xl font-semibold text-foreground">{{ category.label }}</h3>
    {% if category.description %}
    <p class="mt-2 text-sm text-muted-foreground">{{ category.description }}</p>
    {% endif %}
    <div class="mt-6 space-y-4">
      {% for skill in category.skills %}
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-sm font-medium text-foreground">{{ skill.name }}</span>
          <div class="flex items-center gap-3">
            <span class="text-xs font-medium
              {% if skill.priority == 'essential' %}text-green-400
              {% elif skill.priority == 'important' %}text-yellow-400
              {% else %}text-muted-foreground{% endif %}
            ">{{ skill.priority }}</span>
            <span class="text-xs text-muted-foreground w-12 text-right">{{ skill.pct }}%</span>
          </div>
        </div>
        <div class="h-2 rounded-full bg-secondary overflow-hidden">
          <div class="h-full rounded-full
            {% if skill.priority == 'essential' %}bg-green-500
            {% elif skill.priority == 'important' %}bg-yellow-500
            {% else %}bg-muted-foreground{% endif %}
          " style="width: {{ skill.pct }}%"></div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</div>
