<header class="mb-8 space-y-4"
        data-testid="{{ testid|default:'studio-header' }}">
  {% if back_url %}
  <a href="{{ back_url }}" class="inline-block text-sm text-muted-foreground hover:text-foreground transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 focus-visible:ring-offset-background">
    &larr; {{ back_label }}
  </a>
  {% endif %}
  <div>
    {% if eyebrow %}<p class="text-xs font-medium uppercase tracking-widest text-muted-foreground">{{ eyebrow }}</p>{% endif %}
    <h1 class="text-2xl font-semibold tracking-tight text-foreground mt-1 break-all">{{ title }}</h1>
    {% if subtitle %}<p class="text-sm text-muted-foreground mt-1">{{ subtitle }}</p>{% endif %}
    {% if title_meta %}<div class="mt-2 flex flex-wrap items-center gap-2" data-testid="studio-header-meta">{{ title_meta }}</div>{% endif %}
  </div>
  {% if actions %}
  <div class="relative flex flex-wrap items-center gap-2" data-testid="{{ actions_testid|default:'studio-header-actions' }}">
    {{ actions }}
  </div>
  {% endif %}
</header>
