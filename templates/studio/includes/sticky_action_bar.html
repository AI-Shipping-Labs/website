{% load studio_filters %}
<div class="sticky bottom-0 md:top-4 md:bottom-auto z-30 -mx-4 md:mx-0 mb-6" data-testid="sticky-action-bar">
  <div class="border border-border bg-card/95 px-4 py-3 shadow-lg backdrop-blur md:rounded-lg">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div class="min-w-0">
        <p class="text-sm font-medium text-foreground">{{ title }}</p>
        <p class="text-xs text-muted-foreground">{{ subtitle }}{% if docs_url %} <a href="{{ docs_url }}" target="_blank" rel="noopener noreferrer" class="ml-1 text-accent hover:underline" data-testid="sticky-docs-link">{{ docs_label|default:"Docs" }}</a>{% endif %}</p>
      </div>
      <div class="flex flex-nowrap items-center gap-2 overflow-x-auto sm:flex-shrink-0 sm:flex-nowrap sm:overflow-visible" data-testid="sticky-action-row">
        {% if can_save %}
        <button type="submit"
                form="{{ form_id }}"
                class="inline-flex items-center justify-center rounded-md bg-accent px-4 py-2 text-sm font-medium text-accent-foreground transition-opacity hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-accent/50"
                data-testid="sticky-save-action">
          <i data-lucide="save" class="mr-2 h-4 w-4"></i>
          <span>{{ primary_label }}</span>
        </button>
        <a href="{{ cancel_url }}"
           class="inline-flex items-center justify-center rounded-md border border-border bg-secondary px-3 py-2 text-sm font-medium text-foreground transition-colors hover:bg-muted"
           data-testid="sticky-cancel-action">Cancel</a>
        {% else %}
        {% endif %}
      </div>
    </div>
  </div>
</div>
